<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Задание 4. Галерея с превью</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/04-gallery.css">
</head>
<body>
<div class="container">
    <h1>Галерея изображений с превью</h1>
    <p>Наведите курсор на любую миниатюру — рядом появится увеличенное превью.</p>

    <div class="gallery">
        <div class="thumb" data-color="#fb7185"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#fb7185"/></svg></div>
        <div class="thumb" data-color="#60a5fa"><svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" fill="#60a5fa"/></svg></div>
        <div class="thumb" data-color="#34d399"><svg viewBox="0 0 100 100"><polygon points="50,10 90,80 10,80" fill="#34d399"/></svg></div>
        <div class="thumb" data-color="#fbbf24"><svg viewBox="0 0 100 100"><polygon points="50,5 61,38 95,38 67,58 78,92 50,72 22,92 33,58 5,38 39,38" fill="#fbbf24"/></svg></div>
        <div class="thumb" data-color="#a78bfa"><svg viewBox="0 0 100 100"><polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="#a78bfa"/></svg></div>
        <div class="thumb" data-color="#22d3ee"><svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="42" ry="28" fill="#22d3ee"/></svg></div>
    </div>

    <div id="preview" class="preview" hidden>
        <div class="preview__inner"></div>
    </div>

    <a class="back-link" href="index.html">&larr; К содержанию</a>
</div>

<script src="js/04-gallery.js" defer></script>
</body>
</html>
