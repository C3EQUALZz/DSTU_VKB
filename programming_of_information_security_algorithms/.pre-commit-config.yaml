# Конфиг pre-commit (https://pre-commit.com).
# Поставить: `just install-prek`  или вручную: `pip3 install --user pre-commit && pre-commit install`.
# Прогнать на всех файлах: `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.docx$'
      - id: end-of-file-fixer
        exclude: '\.docx$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
