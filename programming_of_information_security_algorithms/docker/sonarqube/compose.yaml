# SonarQube Community Edition + PostgreSQL для лаб 5.
#
# Запуск:   docker compose -f docker/sonarqube/compose.yaml up -d
# Останов:  docker compose -f docker/sonarqube/compose.yaml down
# Чистка:   docker compose -f docker/sonarqube/compose.yaml down -v   # удалит data!
#
# Первичные креды: admin / admin. Сменить при первом входе и сгенерировать
# пользовательский токен (My Account → Security → Generate Tokens).
# Положить токен в .env (SONAR_TOKEN=...).

name: psia-sonarqube

services:
  sonarqube:
    image: sonarqube:10.6-community
    container_name: psia-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Снимаем requirement на bootstrap-проверку elasticsearch на macOS.
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget --quiet --tries=1 --spider http://localhost:9000/api/system/status
          && wget -q -O - http://localhost:9000/api/system/status | grep -q '"status":"UP"'
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  sonar-db:
    image: postgres:16
    container_name: psia-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_db_data:
